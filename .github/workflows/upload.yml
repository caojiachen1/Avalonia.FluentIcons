name: Upload to NuGet

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Avalonia.FluentIcons/Avalonia.FluentIcons.csproj

      - name: Build
        run: dotnet build Avalonia.FluentIcons/Avalonia.FluentIcons.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack Avalonia.FluentIcons/Avalonia.FluentIcons.csproj -c Release --no-build -o ./artifacts

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
